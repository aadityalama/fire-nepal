# FIRE Nepal — optional daily ping to production smart-reminder email cron (same cadence as Hobby `vercel.json`).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CRON_TARGET_URL  — full URL to the final host (prefer www), e.g.
#                      https://www.firenepal.com/api/cron/scheduled-reminders
#                      Apex https://firenepal.com/… 307-redirects to www; this workflow
#                      canonicalizes that so Authorization is not dropped on redirect.
#   CRON_SECRET      — exact same value as Vercel env CRON_SECRET (no quotes, no Bearer prefix,
#                      no leading/trailing whitespace or newlines). API checks:
#                      Authorization: Bearer <CRON_SECRET>
#
# Optional: restrict which branches can run schedules (default branch only for schedule events).

name: Scheduled reminders cron

on:
  schedule:
    # Once per day (UTC), after the Vercel cron hour — redundant safety ping if secrets are configured.
    - cron: "0 7 * * *"
  workflow_dispatch:
  # Allow verifying auth fixes by pushing changes to this workflow file.
  push:
    branches: [main]
    paths:
      - ".github/workflows/scheduled-reminders-cron.yml"

concurrency:
  group: scheduled-reminders-cron
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call /api/cron/scheduled-reminders
        env:
          URL: ${{ secrets.CRON_TARGET_URL }}
          TOKEN: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import re
          import sys
          import urllib.error
          import urllib.request

          def normalize(raw: str) -> str:
              # UTF-8 BOM, CR/LF, surrounding whitespace / NBSP / zero-width.
              s = raw.encode("utf-8").decode("utf-8-sig")
              s = s.replace("\r", "").replace("\n", "")
              s = s.strip().strip("\u00a0\u200b\ufeff")
              if (s.startswith('"') and s.endswith('"')) or (s.startswith("'") and s.endswith("'")):
                  s = s[1:-1].strip()
              # Accidental "Bearer …" paste into the secret value.
              s = re.sub(r"^[Bb]earer\s+", "", s).strip()
              return s

          url = normalize(os.environ.get("URL") or "")
          token = normalize(os.environ.get("TOKEN") or "")

          if not url or not token:
              print("CRON_TARGET_URL or CRON_SECRET is empty after trimming whitespace/newlines.")
              sys.exit(1)

          # Canonicalize apex → www so Authorization is sent to the host that serves the API.
          # urllib follows redirects but may drop Authorization across hosts; avoid that.
          if url.startswith("https://firenepal.com/") or url == "https://firenepal.com":
              url = "https://www.firenepal.com" + url[len("https://firenepal.com") :]
              print("Canonicalized CRON_TARGET_URL host to www.firenepal.com")
          elif url.startswith("http://firenepal.com/") or url == "http://firenepal.com":
              url = "https://www.firenepal.com" + url[len("http://firenepal.com") :]
              print("Canonicalized CRON_TARGET_URL host to www.firenepal.com (https)")

          from urllib.parse import urlparse

          parsed = urlparse(url)
          print(f"Target URL host: {parsed.netloc}")
          print(f"Target URL path: {parsed.path}")
          print(f"CRON_SECRET length (chars): {len(token)}")
          print(f"CRON_SECRET sha256: {hashlib.sha256(token.encode('utf-8')).hexdigest()}")

          req = urllib.request.Request(
              url,
              method="GET",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/json",
                  "User-Agent": "fire-nepal-scheduled-reminders-cron/1.0",
              },
          )

          try:
              with urllib.request.urlopen(req, timeout=90) as resp:
                  body = resp.read().decode("utf-8", errors="replace")
                  code = resp.getcode()
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              code = e.code
          except Exception as e:
              print(f"Request failed: {e}")
              sys.exit(1)

          print(f"HTTP {code}")
          print(body[:2000])

          if code == 401:
              print(
                  "::error::Unauthorized — GitHub secret CRON_SECRET must match Vercel env "
                  "CRON_SECRET exactly (same bytes after trim). Header format is "
                  "Authorization: Bearer <secret>. Prefer "
                  "CRON_TARGET_URL=https://www.firenepal.com/api/cron/scheduled-reminders. "
                  "Compare sha256 above with: printf %s \"$CRON_SECRET\" | sha256sum on Vercel."
              )
              sys.exit(1)

          if code != 200:
              print(f"::error::Expected HTTP 200 from scheduled-reminders cron, got HTTP {code}")
              sys.exit(1)

          try:
              payload = json.loads(body)
          except json.JSONDecodeError:
              print("::error::HTTP 200 but response was not JSON")
              sys.exit(1)

          if payload.get("ok") is not True:
              print("::error::HTTP 200 but response body was not ok:true")
              sys.exit(1)

          print("Scheduled reminders cron ping OK")
          PY
